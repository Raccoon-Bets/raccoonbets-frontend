    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <!-- Cloudflare Web Analytics. Embedded at build time rather than left to
         edge auto-injection: the service worker precaches index.html, so
         returning visitors would be served a copy predating the edge rewrite
         and go uncounted. Reporting goes to cloudflareinsights.com: the
         same-origin /cdn-cgi/rum endpoint only exists while auto-install is
         enabled, and it is off here so the beacon loads exactly once.

         No `integrity`: Cloudflare does not version-pin the beacon, so a
         pinned hash would break on their next release. -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "0ad351a0ff1b45c790200f6bf75f50c4"}'
    ></script>
