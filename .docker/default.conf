# Hashed Vite build assets are immutable; everything else (index.html, sw.js,
# registerSW.js, manifest) must revalidate on every request so that deploys —
# including CSP header changes and service-worker updates — propagate
# immediately instead of being pinned by heuristic HTTP caching.
#
# `no-transform` on those revalidated responses also stops Cloudflare from
# injecting its JavaScript Detections script (window.__CF$cv$params → a
# challenge-platform inline <script>), which the zone's strict script-src
# would block for lack of 'unsafe-inline'. It is free-tier and cannot be
# disabled in the dashboard, so the origin opts out per response instead.
map $uri $cache_control {
    ~^/assets/  "public, max-age=31536000, immutable";
    default     "no-cache, no-transform";
}

server {
    listen  8080      default_server;
    listen  [::]:8080 default_server;
    server_name _;

    # Reject traffic that reached this origin without passing through
    # Cloudflare, which would otherwise bypass the zone's security headers,
    # WAF and analytics. Generated at startup; empty when no secret is set.
    include /etc/nginx/conf.d/origin-lock.inc;

    add_header Cache-Control $cache_control always;

    # Security headers. Content-Security-Policy is set by the zone's
    # response-header ruleset so it stays identical across every site.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Same-origin OAuth broker. Proxy the OmniAuth handshake to the backend so
    # the `state` cookie is set and read first-party to the apex: when api.*
    # sets it cross-site, privacy browsers (Firefox Total Cookie Protection,
    # Safari ITP) drop it and sign-in fails. The providers' single
    # pre-registered redirect_uri also lives on this host. Mirrors
    # raccoonbets-proxy's flycast proxy_pass.
    location /auth/ {
        resolver          [fdaa::3];                  # Fly private DNS (mirror proxy/nginx.conf)
        proxy_pass        http://raccoonbets-backend.flycast;
        proxy_set_header  Host raccoonbets.org;       # backend builds the apex redirect_uri
        proxy_set_header  X-Forwarded-Proto https;    # backend assume_ssl/force_ssl trust this
        proxy_set_header  X-Forwarded-Host  $host;
        proxy_set_header  X-Real-IP         $remote_addr;
    }

    location / {
        root      /usr/share/nginx/html;
        index     index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page  500 502 503 504  /50x.html;
    location = /50x.html {
        root  /usr/share/nginx/html;
    }
}

# Internal server for stub_status (not exposed externally)
server {
    listen 127.0.0.1:8081;
    server_name localhost;

    location /stub_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }
}
