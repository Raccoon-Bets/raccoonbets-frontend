# Hashed Vite build assets are immutable; everything else (index.html, sw.js,
# registerSW.js, manifest) must revalidate on every request so that deploys —
# including CSP header changes and service-worker updates — propagate
# immediately instead of being pinned by heuristic HTTP caching.
map $uri $cache_control {
    ~^/assets/  "public, max-age=31536000, immutable";
    default     "no-cache";
}

server {
    listen  8080      default_server;
    listen  [::]:8080 default_server;
    server_name _;

    add_header Cache-Control $cache_control always;

    # Security headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com {{CSP_SCRIPT_HASHES}}; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.raccoonbets.org wss://api.raccoonbets.org https://*.ingest.sentry.io https://*.sentry.io; worker-src 'self' blob:; child-src 'self' blob:; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self' https://api.raccoonbets.org https://accounts.google.com https://appleid.apple.com; frame-ancestors 'none';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        root      /usr/share/nginx/html;
        index     index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page  500 502 503 504  /50x.html;
    location = /50x.html {
        root  /usr/share/nginx/html;
    }
}

# Internal server for stub_status (not exposed externally)
server {
    listen 127.0.0.1:8081;
    server_name localhost;

    location /stub_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }
}
