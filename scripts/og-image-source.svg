<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="3.2" fill="#f3e3b9"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#fff8e7"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Raccoon mark on a primary-yellow rounded tile -->
  <g transform="translate(120 165)">
    <rect width="300" height="300" rx="48" fill="#ffd23f" stroke="#1a1a1a" stroke-width="8"/>
    <g transform="translate(28 28) scale(2.04)">
      <g transform="rotate(-6 60 60)">
        <g stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
          <path d="M28 38 L18 12 L46 25 Z" fill="#8d8678"/>
          <path d="M92 38 L102 12 L74 25 Z" fill="#8d8678"/>
          <ellipse cx="60" cy="62" rx="40" ry="36" fill="#a8a193"/>
          <path d="M60 70 q-20 0 -26 14 q10 12 26 12 q16 0 26 -12 q-6 -14 -26 -14 Z" fill="#fffaf0" stroke-width="4"/>
          <path d="M20 58 q6 -16 28 -12 q7 9 0 18 q-18 8 -28 -6 Z" fill="#3a3530"/>
          <path d="M100 58 q-6 -16 -28 -12 q-7 9 0 18 q18 8 28 -6 Z" fill="#3a3530"/>
          <circle cx="78" cy="58" r="7" fill="#fff" stroke-width="4"/>
        </g>
        <path d="M35 57 q7 6 14 0" stroke="#fffaf0" stroke-width="5" fill="none" stroke-linecap="round"/>
        <circle cx="76.5" cy="59" r="3.4" fill="#1a1a1a"/>
        <path d="M54 74 q6 -5 12 0 q-3 5 -6 5 q-3 0 -6 -5 Z" fill="#1a1a1a"/>
        <path d="M58 79 q2 6 12 5" stroke="#1a1a1a" stroke-width="4" fill="none" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <!-- Wordmark + tagline -->
  <g font-family="'Arial Rounded MT Bold', system-ui, sans-serif" fill="#1a1a1a">
    <text x="500" y="290" font-size="92" letter-spacing="-1">Raccoon Bets</text>
    <text x="503" y="360" font-size="40" fill="#6b6b6b">Private prediction markets</text>
    <text x="503" y="412" font-size="40" fill="#6b6b6b">for friend groups.</text>
  </g>
</svg>
