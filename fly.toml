# fly.toml app configuration file for raccoonbets-frontend
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# Serves the SPA for the apex domain and every group subdomain
# (raccoonbets.org, www.raccoonbets.org, *.raccoonbets.org); nginx uses
# `server_name _` so new groups need zero config here.

app = 'raccoonbets-frontend'
primary_region = 'sjc'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[metrics]
  port = 9113
  path = '/metrics'

[[vm]]
  size = 'shared-cpu-1x'
